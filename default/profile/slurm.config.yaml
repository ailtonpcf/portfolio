cluster:
  mkdir -p logs/{rule} &&
  sbatch
    --partition={resources.partition}
    --qos={resources.qos}
    --cpus-per-task={threads}
    --hint=nomultithread
    --mem={resources.mem_mb}
    --job-name=smk-{rule}-{wildcards}
    --output=logs/{rule}/{rule}-{wildcards}-%j.out
    --time={resources.time}
default-resources:
  - partition='standard,long'
  - qos='normal'
  - mem_mb=10000
  - disk_mb=0
  - time='3-00:00:00'
  - tmpdir='/vast/qi47rin/tmp'
restart-times: 0
max-status-checks-per-second: 1
latency-wait: 120
jobs: 100
keep-going: True
rerun-incomplete: True
printshellcmds: True
scheduler: greedy
use-conda: True
use-singularity: True
show-failed-logs: True
nolock: True
rerun-triggers: mtime
